name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: the build/test job only needs to read the repo. Uploading test
# results uses the artifact API, which doesn't need extra token scopes.
permissions:
  contents: read

# Cancel an in-progress run when a *PR branch* is pushed again — but never cancel a
# push to main, or that commit is left with a permanently "cancelled" status (masking
# breakage and putting holes in CI-status bisection).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PROJECT: Jetty.xcodeproj
  SCHEME: Jetty

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 30   # a wedged xcodebuild (a documented failure mode) shouldn't burn 6h of 10x-billed runner time
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'   # pin so a runner-image bump can't change the toolchain (Liquid Glass needs Xcode 26)

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            clean test | xcbeautify

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
